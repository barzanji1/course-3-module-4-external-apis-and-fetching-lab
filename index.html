<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Alerts App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Weather Alerts App</h1>

  <form id="weather-form">
    <input
      id="state-input"
      type="text"
      placeholder="Enter state abbreviation"
    />
    <button type="submit">Get Weather Alerts</button>
  </form>

  <div id="loading-message" class="hidden">Loading...</div>
  <div id="error-message" class="hidden"></div>
  <div id="alerts-display"></div>

  <script src="./index.js"></script>
</body>
</html>
